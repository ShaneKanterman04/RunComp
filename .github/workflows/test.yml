name: RunComp checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test on self-hosted runner
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Unit tests
        run: pnpm exec jest --runInBand

      - name: Production build
        run: pnpm build
